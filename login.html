<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Sign In — Novus Ops</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#101420;--surface:#1a1f2e;--border:rgba(255,255,255,.07);--text:#e1e5f0;--text-2:#94a3b8;--text-3:#4a5568;--accent:#00e5ff;--red:#ef4444;--red-bg:rgba(239,68,68,.08)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:40px;box-shadow:0 8px 48px rgba(0,0,0,.6)}
.logo{text-align:center;margin-bottom:36px}
.logo-icon{font-size:40px;margin-bottom:12px}
.logo h1{font-size:24px;font-weight:900;letter-spacing:-.5px}
.logo p{font-size:11px;color:var(--text-2);margin-top:4px;font-weight:600}
.label{display:block;font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-3);margin-bottom:6px;margin-top:20px}
.label:first-of-type{margin-top:0}
input{width:100%;padding:14px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;font-size:15px;font-weight:600;color:var(--text);outline:none;font-family:inherit;transition:border-color .15s;-webkit-appearance:none}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--text-3)}
.btn{width:100%;margin-top:28px;padding:18px;border-radius:14px;background:var(--accent);color:#101420;font-size:14px;font-weight:900;border:none;cursor:pointer;font-family:inherit;transition:filter .15s;display:flex;align-items:center;justify-content:center;gap:8px;min-height:58px}
.btn:hover{filter:brightness(1.08)}
.btn:disabled{opacity:.5;cursor:default;pointer-events:none}
.spinner{width:16px;height:16px;border:2px solid rgba(16,20,32,.3);border-top-color:#101420;border-radius:50%;animation:spin .6s linear infinite;display:none}
.btn.loading .spinner{display:block}
.btn.loading .btn-text{display:none}
.error{margin-top:14px;padding:12px 14px;background:var(--red-bg);border:1px solid rgba(239,68,68,.2);border-radius:10px;font-size:12px;font-weight:700;color:var(--red);display:none;text-align:center}
.error.show{display:block}
.footer{text-align:center;margin-top:24px;font-size:10px;color:var(--text-3);font-weight:600}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📦</div>
    <h1>Novus Ops</h1>
    <p>Plant 1730 · Inventory Control Platform</p>
  </div>

  <label class="label">Email Address</label>
  <input type="email" id="email" placeholder="you@company.com"
         autocomplete="email" inputmode="email">

  <label class="label">Password</label>
  <input type="password" id="password" placeholder="••••••••"
         autocomplete="current-password">

  <div class="error" id="error-msg"></div>

  <button class="btn" id="login-btn" onclick="login()">
    <div class="spinner"></div>
    <span class="btn-text">Sign In →</span>
  </button>

  <div class="footer">Novus Foods · Buena Park CA · Plant 1730</div>
</div>

<script src="novus-core.js"></script>
<script>
  // Already logged in? Skip straight to the app
  if (NovusAuth.isLoggedIn()) {
    window.location.href = 'index.html';
  }

  async function login() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('login-btn');
    const errEl    = document.getElementById('error-msg');

    errEl.classList.remove('show');

    if (!email || !password) {
      errEl.textContent = 'Please enter your email and password.';
      errEl.classList.add('show');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    const result = await NovusAuth.signIn(email, password);

    if (result.success) {
      window.location.href = 'index.html';
    } else {
      errEl.textContent = result.error || 'Incorrect email or password.';
      errEl.classList.add('show');
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
