<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Cycle Counter — Novus Ops</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Design tokens ─────────────────────── */
:root{
  --bg:#0f1117;--surface:#181a23;--surface-2:#1f2230;--surface-3:#2a2d3a;
  --border:#313546;--text:#eceef4;--text-2:#9ba1b5;--text-3:#6c7189;
  --accent:#5b9aff;--accent-dim:rgba(91,154,255,.1);
  --green:#34d399;--green-bg:rgba(52,211,153,.1);--green-border:rgba(52,211,153,.25);
  --red:#f87171;--red-bg:rgba(248,113,113,.1);--red-border:rgba(248,113,113,.25);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,.1);--amber-border:rgba(251,191,36,.25);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.1);
  --cyan:#22d3ee;--cyan-bg:rgba(34,211,238,.1);
  --radius:14px;--radius-sm:10px;
}

/* ── Reset ─────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100dvh}
button{font-family:inherit;border:none;cursor:pointer;-webkit-appearance:none}
/* Hardware-accelerated press feedback: transform only */
button:active{transform:scale(.96)}
input,textarea{font-family:inherit}
.mono{font-family:'JetBrains Mono',monospace}

/* ── Screen system ──────────────────────
   Screens slide in/out with transform (GPU),
   never toggling display or height.
─────────────────────────────────────── */
.screen{
  display:none;flex-direction:column;height:100dvh;overflow:hidden;
}
.screen.active{display:flex}

/* ── Header ────────────────────────────── */
.header{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.header h1{font-size:15px;font-weight:800}
.header-sub{font-size:10px;color:var(--text-2);font-weight:600}
.header-right{display:flex;align-items:center;gap:8px}
.hdr-btn{
  background:var(--surface-2);color:var(--text-2);
  padding:8px 12px;border-radius:var(--radius-sm);font-size:10px;font-weight:700;
  transition:opacity .15s;
}
.hdr-btn:hover{opacity:.75}

/* ── Sync / queue indicators ────────────── */
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.offline{background:var(--amber)}
/* Pulse uses opacity only (hardware-accelerated) */
.sync-dot.syncing{animation:dot-pulse 1s infinite}
@keyframes dot-pulse{50%{opacity:.25}}
.queue-badge{
  background:var(--amber-bg);color:var(--amber);
  padding:3px 8px;border-radius:6px;font-size:9px;font-weight:800;
}
.queue-badge[hidden]{display:none}

/* ── Skeleton loader ────────────────────── */
.skeleton{
  background:linear-gradient(90deg,var(--surface-2) 25%,var(--surface-3) 50%,var(--surface-2) 75%);
  background-size:400% 100%;
  border-radius:8px;
  /* Opacity animation — no layout properties */
  animation:shimmer 1.5s infinite;
}
@keyframes shimmer{
  0%{opacity:.5}50%{opacity:1}100%{opacity:.5}
}
.skeleton-card{height:120px;border-radius:var(--radius);margin-bottom:8px}
.skeleton-stat{height:72px;border-radius:var(--radius);flex:1}

/* ── Setup screen ───────────────────────── */
.setup-content{
  flex:1;overflow-y:auto;padding:16px;padding-bottom:90px;
  -webkit-overflow-scrolling:touch;
}
.setup-content::-webkit-scrollbar{display:none}

.stat-row{display:flex;gap:8px;margin-bottom:16px}
.stat-box{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;text-align:center;
}
.stat-val{
  font-family:'JetBrains Mono',monospace;font-size:22px;
  font-weight:700;color:var(--accent);
}
.stat-label{
  font-size:8px;font-weight:700;text-transform:uppercase;
  letter-spacing:1.2px;color:var(--text-3);margin-top:4px;
}

.section-title{
  font-size:10px;font-weight:800;text-transform:uppercase;
  letter-spacing:1.5px;color:var(--text-3);margin:18px 0 10px;
}

/* Product search bar */
.search-row{display:flex;gap:8px;margin-bottom:24px}
.search-input{
  flex:1;padding:12px;border-radius:12px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--accent);font-family:'JetBrains Mono',monospace;
  font-weight:700;outline:none;font-size:14px;
  transition:border-color .15s;
}
.search-input:focus{border-color:var(--accent)}
.search-btn{
  background:var(--accent);color:#fff;
  padding:0 18px;border-radius:12px;font-size:12px;font-weight:800;
  transition:opacity .15s;
}
.search-btn:hover{opacity:.85}

/* Aisle grid */
.aisle-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.aisle-btn{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius);padding:20px 0;text-align:center;
  font-size:24px;font-weight:900;color:var(--text);
  position:relative;overflow:hidden;
  /* Transition via transform+opacity only */
  transition:transform .15s, opacity .15s, border-color .15s;
}
.aisle-btn:active{transform:scale(.94)}
.aisle-btn.done{border-color:var(--green-border);background:var(--green-bg)}
.aisle-btn .a-count{
  position:absolute;top:5px;right:7px;
  font-size:8px;font-weight:700;color:var(--text-3);
}

/* ── Phase bar ──────────────────────────── */
.phase-bar{
  display:flex;gap:2px;padding:10px 16px 0;background:var(--surface);
}
.phase-step{
  flex:1;height:4px;border-radius:2px;background:var(--surface-3);
  /* Transform scale for fill animation */
  transform-origin:left;
  transition:background .3s ease;
}
.phase-step.active{background:var(--accent)}
.phase-step.done{background:var(--green)}
.phase-labels{
  display:flex;justify-content:space-between;
  padding:4px 16px 10px;font-size:8px;font-weight:700;
  text-transform:uppercase;letter-spacing:1.5px;
  color:var(--text-3);background:var(--surface);
  border-bottom:1px solid var(--border);
}
.phase-labels span.active{color:var(--accent)}
.phase-labels span.done{color:var(--green)}

/* ── Bin navigation ─────────────────────── */
.bin-nav{
  display:flex;gap:6px;padding:12px 16px;
  background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;align-items:center;
}
.nav-btn{
  width:52px;height:52px;border-radius:12px;
  background:var(--surface-2);color:var(--text-3);
  font-size:18px;font-weight:900;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background .15s, color .15s;
}
.nav-btn:hover{background:var(--accent-dim);color:var(--accent)}
.bin-input{
  flex:1;padding:14px;background:var(--surface-2);
  border:2px solid var(--border);border-radius:12px;
  font-family:'JetBrains Mono',monospace;font-size:20px;
  font-weight:700;color:var(--accent);text-transform:uppercase;
  text-align:center;outline:none;transition:border-color .15s;
}
.bin-input:focus{border-color:var(--accent)}

/* ── Bin strip ──────────────────────────── */
.bin-strip{
  display:flex;gap:3px;padding:8px 16px;
  overflow-x:auto;background:var(--surface);
  scrollbar-width:none;flex-shrink:0;
}
.bin-strip::-webkit-scrollbar{display:none}
.strip-dot{
  min-width:26px;height:26px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:800;
  background:var(--surface-2);color:var(--text-3);flex-shrink:0;
  cursor:pointer;
  transition:transform .15s, opacity .15s;
}
.strip-dot:active{transform:scale(.88)}
.strip-dot.current{min-width:38px;font-size:10px;background:var(--accent);color:#fff}
.strip-dot.done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}

/* ── HU list ────────────────────────────── */
.hu-list{
  flex:1;overflow-y:auto;
  padding:12px 16px 260px;
  -webkit-overflow-scrolling:touch;
}
.hu-list::-webkit-scrollbar{display:none}

.hu-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius);padding:16px;margin-bottom:8px;
  /* Fade in when first rendered */
  animation:card-in .2s ease both;
}
@keyframes card-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.hu-card.confirmed{border-color:var(--green-border);background:var(--green-bg)}
.hu-card.missing{border-color:var(--red-border);background:var(--red-bg);opacity:.7}
.hu-card.adjusted{border-color:var(--amber-border);background:var(--amber-bg)}
.hu-card.extra{border-color:rgba(6,182,212,.25);background:var(--cyan-bg)}

.hu-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hu-id{
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
  color:var(--accent);background:var(--accent-dim);padding:3px 10px;border-radius:6px;
}
.hu-badge{
  font-size:8px;font-weight:800;text-transform:uppercase;
  padding:3px 10px;border-radius:6px;letter-spacing:.5px;
}
.hu-badge.ok{background:var(--green-bg);color:var(--green)}
.hu-badge.miss{background:var(--red-bg);color:var(--red)}
.hu-badge.adj{background:var(--amber-bg);color:var(--amber)}
.hu-badge.ext{background:var(--cyan-bg);color:var(--cyan)}

.hu-meta{display:flex;gap:16px;margin-bottom:6px}
.meta-label{display:block;font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-3)}
.meta-val{font-size:13px;font-weight:700;margin-top:1px}
.hu-desc{font-size:10px;color:var(--text-2);margin-bottom:10px}

/* Qty row */
.qty-row{
  display:flex;align-items:center;gap:6px;
  background:var(--surface-2);border-radius:12px;padding:6px;margin-bottom:8px;
}
.qty-btn{
  width:64px;height:64px;border-radius:12px;
  background:var(--surface-3);font-size:28px;font-weight:900;
  color:var(--text-3);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .15s, color .15s;
}
.qty-btn.plus{color:var(--accent)}
.qty-btn:active{transform:scale(.9)}
.qty-input{
  flex:1;background:transparent;border:none;text-align:center;
  font-family:'JetBrains Mono',monospace;font-size:38px;
  font-weight:700;color:var(--accent);outline:none;min-width:0;
}
.qty-input::placeholder{color:var(--surface-3)}
.sap-hint{text-align:center;font-size:9px;font-weight:700;color:var(--text-3);margin-bottom:8px}

/* Action buttons */
.hu-actions{display:flex;gap:6px}
.act-btn{
  flex:1;padding:18px 0;border-radius:12px;font-size:12px;
  font-weight:800;text-transform:uppercase;min-height:56px;
  display:flex;align-items:center;justify-content:center;
}
.act-btn.confirm{background:var(--green);color:#fff}
.act-btn.miss{
  background:var(--surface-3);color:var(--red);
  border:1.5px solid var(--red-border);
}
.act-btn.miss.active{background:var(--red);color:#fff}

/* Resolved state */
.resolved-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;background:var(--surface-2);
  border-radius:var(--radius-sm);margin-bottom:6px;
}
.resolved-label{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-3)}
.resolved-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}
.resolved-val.match{color:var(--green)}.resolved-val.mismatch{color:var(--amber)}

.undo-btn{
  width:100%;padding:8px;background:none;
  color:var(--text-3);font-size:9px;font-weight:700;
}

/* Note + move row */
.card-footer-row{display:flex;gap:6px;margin-top:6px}
.note-btn{
  flex:1;padding:10px 14px;background:var(--surface-2);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:10px;font-weight:700;color:var(--text-3);text-align:left;
  transition:background .15s, border-color .15s, color .15s;
}
.note-btn.has{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber)}
.move-btn{
  flex:1;padding:10px 14px;background:var(--purple-bg);
  border:1px solid rgba(167,139,250,.3);border-radius:var(--radius-sm);
  font-size:10px;font-weight:700;color:var(--purple);text-align:left;
}

/* Already-counted banner */
.counted-banner{
  display:flex;align-items:center;gap:12px;padding:10px 14px;
  border-radius:var(--radius);margin-bottom:8px;
  background:var(--green-bg);border:1px solid var(--green-border);
  /* Fade in with opacity only */
  animation:card-in .25s ease both;
}
.counted-banner strong{font-size:11px;color:var(--green);font-weight:800}
.counted-banner small{font-size:9px;color:var(--text-2)}

.empty-bin{text-align:center;padding:48px 24px;color:var(--text-3)}
.empty-bin .icon{font-size:40px;margin-bottom:10px;display:block}

/* Extra-item form */
.extra-form{
  background:var(--surface);border:1.5px dashed var(--border);
  border-radius:var(--radius);padding:16px;margin-bottom:8px;
  animation:card-in .2s ease both;
}
.extra-form h3{
  font-size:10px;font-weight:800;text-transform:uppercase;
  letter-spacing:1px;color:var(--cyan);margin-bottom:10px;
}
.field{
  width:100%;padding:14px;background:var(--surface-2);
  border:1.5px solid var(--border);border-radius:12px;
  font-size:15px;font-weight:600;color:var(--text);outline:none;
  margin-bottom:6px;transition:border-color .15s;
}
.field:focus{border-color:var(--accent)}
.field::placeholder{color:var(--text-3)}
.field-row{display:flex;gap:6px}

/* ── Bottom bar ─────────────────────────── */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  padding:10px 16px calc(env(safe-area-inset-bottom,14px) + 10px);
  background:rgba(11,12,16,.92);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);z-index:50;
}
.bottom-row{display:flex;gap:6px;margin-bottom:8px}
.btn-sec{
  flex:1;padding:14px 0;border-radius:12px;font-size:11px;
  font-weight:800;text-transform:uppercase;background:var(--surface-2);
  color:var(--text-2);border:1.5px solid var(--border);text-align:center;
  min-height:48px;transition:background .15s, color .15s, border-color .15s;
}
.btn-sec:hover{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.btn-pri{
  width:100%;padding:18px 0;border-radius:var(--radius);font-size:14px;
  font-weight:800;text-transform:uppercase;background:var(--green);
  color:#fff;min-height:60px;display:flex;align-items:center;
  justify-content:center;
  /* State changes use opacity, not background transitions (triggers no layout) */
  transition:opacity .2s;
}
.btn-pri.disabled{background:var(--surface-3);color:var(--text-3);pointer-events:none}

/* ── Setup nav (bottom tabs on setup screen) */
.setup-nav{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;gap:6px;
  padding:10px 16px calc(env(safe-area-inset-bottom,14px) + 10px);
  background:rgba(11,12,16,.92);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
}
.setup-nav .nav-tab{
  flex:1;padding:14px 0;border-radius:12px;font-size:11px;
  font-weight:800;text-transform:uppercase;background:var(--surface-2);
  color:var(--text-2);border:1.5px solid var(--border);text-align:center;
  min-height:48px;display:flex;align-items:center;justify-content:center;
  text-decoration:none;
}
.setup-nav .nav-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── Move modal ─────────────────────────── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.8);backdrop-filter:blur(5px);
  z-index:100;align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.open{display:flex}
.modal-box{
  background:var(--surface);width:100%;max-width:400px;
  padding:20px;border-radius:var(--radius);border:1px solid var(--purple);
  /* Animate in with transform+opacity */
  transform:scale(.96) translateY(10px);opacity:0;
  transition:transform .2s cubic-bezier(.34,1.3,.64,1),opacity .18s ease;
}
.modal-overlay.open .modal-box{transform:none;opacity:1}
.modal-title{color:var(--purple);font-size:16px;font-weight:800;margin-bottom:16px}
.field-label{
  font-size:8px;font-weight:700;text-transform:uppercase;
  letter-spacing:1.2px;color:var(--text-3);display:block;margin-bottom:6px;
}
.info-block{
  margin:8px 0 16px;font-size:11px;color:var(--text-2);min-height:40px;
  background:var(--surface-2);padding:8px;border-radius:8px;line-height:1.5;
}
.move-actions{display:flex;gap:8px;margin-top:24px}
.move-actions .btn-cancel{
  flex:1;padding:14px;border-radius:8px;background:var(--surface-3);
  color:var(--text-2);font-size:11px;font-weight:800;
}
.move-actions .btn-submit{
  flex:2;padding:14px;border-radius:8px;background:var(--purple);
  color:#fff;font-size:11px;font-weight:800;
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     SCREEN: SETUP
     Aisle grid and product search
════════════════════════════════════════ -->
<div id="screen-setup" class="screen active">
  <div class="header">
    <div>
      <h1>Cycle Counter</h1>
      <div class="header-sub" id="stat-progress">0 / 0 bins counted</div>
    </div>
    <div class="header-right">
      <span class="queue-badge" id="queue-badge" hidden>0 queued</span>
      <button class="hdr-btn" id="refresh-btn" onclick="refreshAll()">↻ Refresh</button>
      <div class="sync-dot" id="sync-dot"></div>
      <button class="hdr-btn" onclick="NovusSettings.openModal()">⚙</button>

    </div>
  </div>

  <div class="setup-content">
    <!-- KPI stats -->
    <div class="stat-row" id="stat-row">
      <div class="stat-box"><div class="stat-val" id="stat-loaded">—</div><div class="stat-label">SAP Items</div></div>
      <div class="stat-box"><div class="stat-val" id="stat-bins">—</div><div class="stat-label">Bins</div></div>
      <div class="stat-box"><div class="stat-val" id="stat-done">0</div><div class="stat-label">Done Today</div></div>
    </div>

    <!-- Product search -->
    <div class="section-title">Count By Product</div>
    <div class="search-row">
      <input type="text" id="product-search" class="search-input"
             placeholder="Enter Product #..." autocomplete="off" autocorrect="off"
             onkeydown="if(event.key==='Enter') searchProduct()">
      <button class="search-btn" onclick="searchProduct()">Search</button>
    </div>

    <!-- Aisle grid (populated by JS) -->
    <div class="section-title">Select Aisle</div>
    <div class="aisle-grid" id="aisle-grid">
      <!-- Skeleton placeholders while data loads -->
      <div class="skeleton" style="height:72px;border-radius:14px"></div>
      <div class="skeleton" style="height:72px;border-radius:14px"></div>
      <div class="skeleton" style="height:72px;border-radius:14px"></div>
      <div class="skeleton" style="height:72px;border-radius:14px"></div>
      <div class="skeleton" style="height:72px;border-radius:14px"></div>
      <div class="skeleton" style="height:72px;border-radius:14px"></div>
      <div class="skeleton" style="height:72px;border-radius:14px"></div>
      <div class="skeleton" style="height:72px;border-radius:14px"></div>
    </div>
  </div>

  <nav class="setup-nav">
    <button class="nav-tab active">Count</button>
    <a href="index.html" class="nav-tab">Home</a>
  </nav>
</div>


<!-- ═══════════════════════════════════════
     SCREEN: COUNTING
     Bin-by-bin HU verification
════════════════════════════════════════ -->
<div id="screen-counting" class="screen">
  <div class="header">
    <button class="hdr-btn" onclick="backToSetup()">← Back</button>
    <h1 id="count-bin-title">—</h1>
    <div class="sync-dot" id="sync-dot-count"></div>
  </div>

  <!-- Phase progress indicator -->
  <div class="phase-bar">
    <div class="phase-step" id="ph1"></div>
    <div class="phase-step" id="ph2"></div>
    <div class="phase-step" id="ph3"></div>
  </div>
  <div class="phase-labels">
    <span id="phl1">Check HUs</span>
    <span id="phl2">Extras</span>
    <span id="phl3">Finalize</span>
  </div>

  <!-- Bin navigation: arrow buttons + scannable input -->
  <div class="bin-nav">
    <button class="nav-btn" id="btn-prev-bin" onclick="stepBin(-1)">◀</button>
    <!--
      DEBOUNCED: The bin-input's keydown handler is debounced in JS.
      This prevents UI lockup when a barcode scanner fires many keystrokes
      in rapid succession.
    -->
    <input type="text" class="bin-input" id="bin-input"
           placeholder="SCAN BIN…"
           autocomplete="off" autocorrect="off" autocapitalize="characters"
           spellcheck="false">
    <button class="nav-btn" id="btn-next-bin" onclick="stepBin(1)">▶</button>
  </div>

  <!-- Horizontal bin strip -->
  <div class="bin-strip" id="bin-strip"></div>

  <!--
    HU LIST — event delegation target.
    A SINGLE click listener and a SINGLE input listener are
    attached to this element. All child interactions use
    data-action / data-idx attributes instead of inline handlers.
    This means no per-card event listeners are created, keeping
    the GC clean and rendering fast even with 30+ HU cards.
  -->
  <div class="hu-list" id="hu-list" role="list"></div>

  <!-- Fixed bottom action bar -->
  <div class="bottom-bar">
    <div class="bottom-row">
      <button class="btn-sec" id="btn-toggle-extra" data-action="toggle-extra">+ Found Extra</button>
      <button class="btn-sec" id="btn-confirm-all" data-action="confirm-all">✓ Confirm All</button>
    </div>
    <button class="btn-pri disabled" id="btn-finalize" onclick="finalizeBin()">
      Finalize &amp; Next Bin →
    </button>
  </div>
</div>


<!-- ═══════════════════════════════════════
     MODAL: MOVE TO BIN
════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-move">
  <div class="modal-box">
    <h3 class="modal-title">🔄 Move Item to Another Bin</h3>

    <label class="field-label">HU Number</label>
    <input type="text" id="qm-hu" class="field mono" readonly>

    <div class="info-block" id="qm-info">—</div>

    <div class="field-row">
      <div style="flex:2">
        <label class="field-label">Found In Bin</label>
        <input type="text" id="qm-bin" class="field mono"
               placeholder="e.g. WA12A" autocapitalize="characters">
      </div>
      <div style="flex:1">
        <label class="field-label">Actual Qty</label>
        <input type="number" inputmode="numeric" id="qm-qty" class="field mono" placeholder="Qty">
      </div>
    </div>

    <div class="move-actions">
      <button class="btn-cancel" onclick="closeMoveModal()">Cancel</button>
      <button class="btn-submit" onclick="submitMove()">Log Movement</button>
    </div>
  </div>
</div>


<!-- ── Scripts ─────────────────────────────
     Load novus-core.js first: provides NovusSettings,
     toast, NovusFetch, debounce, haptic, escHtml.
─────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="novus-core.js"></script>
<script src="novus-db.js"></script>
<script>
/* ═══════════════════════════════════════════
   SCANNER PAGE LOGIC
   ─────────────────────────────────────────
   Architecture decisions:
   1. renderHUList() builds one HTML string then assigns
      el.innerHTML ONCE (single repaint).
   2. All card interactions use delegated listeners on
      #hu-list — no per-card event listeners.
   3. Bin input is debounced (250 ms) to absorb barcode
      scanner key burst.
   4. CSS transitions only touch transform + opacity.
   5. sendPayload() never blocks the UI — shows inline
      spinner, resolves async.
═══════════════════════════════════════════ */

'use strict';

/* ─── State ─────────────────────────────── */
let sapMaster  = _loadSap();          // [{sapBin, hu, product, ...}]
let binIndex   = {};                  // { 'WA01A': [...items] }
let huIndex    = new Map();           // hu → item
let completedBins = _loadDone();      // Set of bin strings, expires daily
let offlineQueue  = _loadQueue();     // Array of pending payloads
let isOnline      = navigator.onLine;
// auditorName is always 'Counter' — no login required on scanner
const auditorName = 'Counter';

// Counting session state
let currentBin   = '';
let currentItems = [];   // Working copy for the current bin
let phase        = 1;
let aisleBins    = [];   // Ordered list of bins in current aisle/product
let binIdx       = 0;
let showingExtra = false;
let targetProduct = null;  // Non-null when counting by product
let activeMoveIdx = -1;    // Index of item currently in the move modal
let isSubmitting  = false; // Guards against double-taps on finalize

/* ─── Init ──────────────────────────────── */
_updateQueueBadge();
_updateSyncDot();

if (sapMaster.length > 0) {
  _buildIndexes();
  _showSetup();
} else {
  _pullCloud();
}

/* Online/offline listeners */
window.addEventListener('online',  () => { isOnline = true;  _updateSyncDot(); _flushQueue(); });
window.addEventListener('offline', () => { isOnline = false; _updateSyncDot(); });

/* Settings change → no-op on scanner (name is fixed) */
window.addEventListener('novus-settings-changed', () => {});

/* ─── Delegated event listeners ─────────────
   Both click and input events on #hu-list use
   a single handler instead of per-card listeners.
─────────────────────────────────────────── */
const huListEl = document.getElementById('hu-list');

huListEl.addEventListener('click', e => {
  // Walk up the DOM until we find a [data-action] element or the list boundary
  const btn = e.target.closest('[data-action]');
  if (!btn || !huListEl.contains(btn)) return;

  const action = btn.dataset.action;
  const idx    = btn.dataset.idx !== undefined ? parseInt(btn.dataset.idx, 10) : -1;

  switch (action) {
    case 'confirm-hu':    confirmHU(idx);                            break;
    case 'mark-missing':  markMissing(idx);                         break;
    case 'adj-minus':     adjustQty(idx, -1);                       break;
    case 'adj-plus':      adjustQty(idx, +1);                       break;
    case 'reset-hu':      resetHU(idx);                             break;
    case 'add-note':      addNote(idx);                             break;
    case 'open-move':     openMoveModal(idx);                       break;
    case 'toggle-extra':  toggleExtraForm();                        break;
    case 'cancel-extra':  toggleExtraForm(false);                   break;
    case 'submit-extra':  addExtra();                               break;
  }
});

/* Delegated input listener — qty fields */
huListEl.addEventListener('input', e => {
  if (e.target.dataset.action !== 'qty-input') return;
  const idx = parseInt(e.target.dataset.idx, 10);
  setQtyFromInput(idx, e.target.value);
});

/* Bottom bar button delegation */
document.getElementById('btn-toggle-extra').addEventListener('click', () => toggleExtraForm());
document.getElementById('btn-confirm-all').addEventListener('click', confirmAll);

/* Bin input — debounced 250 ms to absorb scanner key bursts */
document.getElementById('bin-input').addEventListener('keydown', debounce(e => {
  if (e.key === 'Enter') navigateToBin(e.target.value.trim().toUpperCase());
}, 250));

/* ─── Data loading ──────────────────────── */

function _loadSap() {
  try { return JSON.parse(localStorage.getItem('novus_sap') || '[]'); }
  catch { return []; }
}

function _loadDone() {
  try {
    const today = new Date().toDateString();
    const raw   = JSON.parse(localStorage.getItem('novus_done') || '{}');
    // Auto-expire if date changed or legacy format (array)
    if (Array.isArray(raw) || raw.date !== today) {
      _saveDone(new Set());
      return new Set();
    }
    return new Set(raw.bins);
  } catch { return new Set(); }
}

function _saveDone(set) {
  localStorage.setItem('novus_done', JSON.stringify({
    date: new Date().toDateString(),
    bins: [...set],
  }));
}

function _loadQueue() {
  try { return JSON.parse(localStorage.getItem('novus_queue') || '[]'); }
  catch { return []; }
}

function _saveQueue() {
  localStorage.setItem('novus_queue', JSON.stringify(offlineQueue));
}

async function _pullCloud() {
  try {
    const data = await NovusFetch.get('?type=sapdata');
    if (data.sapData?.length) {
      sapMaster = data.sapData;
      localStorage.setItem('novus_sap', JSON.stringify(sapMaster));
      _buildIndexes();
      _showSetup();
      toast(`${sapMaster.length} items loaded`, 'blue');
    } else {
      _showSetup(); // show empty state
    }
  } catch {
    isOnline = false; _updateSyncDot();
    if (sapMaster.length > 0) { _buildIndexes(); _showSetup(); }
    else { toast('No SAP data — upload from Control Center', 'amber'); _showSetup(); }
  }
}

async function refreshAll() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = '…'; btn.style.opacity = '.5'; btn.style.pointerEvents = 'none';

  try {
    const data = await NovusFetch.get('?type=sapdata');
    if (data.sapData?.length) {
      sapMaster = data.sapData;
      localStorage.setItem('novus_sap', JSON.stringify(sapMaster));
      _buildIndexes();
      isOnline = true; _updateSyncDot();

      // Offer to clear done-bins when fresh data arrives
      if (completedBins.size > 0 &&
          confirm('New SAP data loaded. Clear "Already Counted" bins for a fresh cycle?')) {
        completedBins.clear();
        _saveDone(completedBins);
      }

      _buildAisleGrid();
      _updateDoneCount();
      toast(`Refreshed · ${sapMaster.length} items`, 'blue');
    }
  } catch {
    isOnline = false; _updateSyncDot();
    toast('Refresh failed — offline mode', 'red');
  }

  btn.textContent = '↻ Refresh'; btn.style.opacity = ''; btn.style.pointerEvents = '';
}

/* ─── Index building ────────────────────── */

function _buildIndexes() {
  binIndex = {}; huIndex = new Map();

  sapMaster.forEach(i => {
    // Normalise field names (handles varying SAP export column headers)
    i.sapBin  = String(i.sapBin  || i.expectedBin || '').trim().toUpperCase();
    i.hu      = String(i.hu      || '').trim();
    i.product = String(i.product || '').trim();
    i.batch   = String(i.batch   || '').trim();
    i.desc    = String(i.desc    || '');
    i.sapQty  = Number(i.sapQty  || i.expectedQty) || 0;

    if (i.sapBin) {
      if (!binIndex[i.sapBin]) binIndex[i.sapBin] = [];
      binIndex[i.sapBin].push(i);
    }
    if (i.hu) huIndex.set(i.hu, i);
  });

  document.getElementById('stat-loaded').textContent = sapMaster.length.toLocaleString();
  document.getElementById('stat-bins').textContent   = Object.keys(binIndex).length.toLocaleString();
  _updateDoneCount();
}

/* ─── Setup screen ──────────────────────── */

function _showSetup() {
  _switchScreen('setup');
  _buildAisleGrid();
}

function _buildAisleGrid() {
  const grid = document.getElementById('aisle-grid');

  /*
    Build the entire grid HTML as one string then assign once.
    This is a single repaint vs. appending 14 individual nodes.
  */
  let html = '';
  AISLE_ROWS.forEach(letter => {
    const bins    = Object.keys(binIndex).filter(b => b.charAt(1) === letter);
    const done    = bins.filter(b => completedBins.has(b)).length;
    const allDone = bins.length > 0 && done >= bins.length;
    html += `<button class="aisle-btn${allDone ? ' done' : ''}"
               onclick="selectAisle('${letter}')">
               ${letter}<span class="a-count">${done}/${bins.length}</span>
             </button>`;
  });
  grid.innerHTML = html;
}

function _updateDoneCount() {
  const total = Object.keys(binIndex).length;
  document.getElementById('stat-done').textContent = completedBins.size;
  document.getElementById('stat-progress').textContent =
    `${completedBins.size} / ${total} bins counted`;
}

/* Product search */
function searchProduct() {
  const raw = document.getElementById('product-search').value.trim().toUpperCase();
  if (!raw) return;

  const bins = [...new Set(
    sapMaster
      .filter(i => i.product.toUpperCase() === raw)
      .map(i => i.sapBin)
  )].sort();

  if (!bins.length) { toast(`Product ${raw} not found`, 'amber'); return; }

  targetProduct = raw;
  aisleBins = bins;
  binIdx    = 0;
  toast(`${raw} found in ${bins.length} bin${bins.length > 1 ? 's' : ''}`, 'blue');
  navigateToBin(aisleBins[0]);
}

/* Aisle selection */
function selectAisle(letter) {
  targetProduct = null;
  const limit = 'BC'.includes(letter) ? 25 : 38;
  aisleBins = [];
  for (let n = 0; n <= limit; n++) {
    ['A','B','C'].forEach(s =>
      aisleBins.push(`W${letter}${String(n).padStart(2,'0')}${s}`)
    );
  }
  binIdx = 0;
  navigateToBin(aisleBins[0]);
}

/* ─── Bin navigation ────────────────────── */

function navigateToBin(bin) {
  if (!bin) return;
  currentBin = bin.toUpperCase();
  binIdx = aisleBins.indexOf(currentBin);
  if (binIdx < 0) binIdx = 0;

  // Build working item list
  let expected = binIndex[currentBin] || [];
  if (targetProduct) {
    expected = expected.filter(i => i.product.toUpperCase() === targetProduct);
  }

  currentItems = expected.map(i => ({
    hu:         i.hu,
    product:    i.product,
    desc:       i.desc,
    batch:      i.batch,
    sapBin:     i.sapBin,
    sapQty:     i.sapQty,
    scannedQty: 0,
    status:     'pending',  // pending | confirmed | adjusted | missing
    isExtra:    false,
    note:       '',
  }));

  phase        = 1;
  showingExtra = false;

  _switchScreen('counting');
  document.getElementById('count-bin-title').textContent = currentBin;
  document.getElementById('bin-input').value              = currentBin;

  _renderPhase();
  _renderStrip();
  renderHUList();
  _updateFinalizeBtn();
}

function stepBin(dir) {
  const next = binIdx + dir;
  if (next >= 0 && next < aisleBins.length) navigateToBin(aisleBins[next]);
}

function backToSetup() {
  targetProduct = null;
  document.getElementById('product-search').value = '';
  _switchScreen('setup');
  _buildAisleGrid();
}

/* ─── Phase bar ─────────────────────────── */

function _renderPhase() {
  for (let i = 0; i < 3; i++) {
    const ph  = document.getElementById(`ph${i+1}`);
    const lbl = document.getElementById(`phl${i+1}`);
    const step = i + 1;
    ph.className  = `phase-step ${phase === step ? 'active' : phase > step ? 'done' : ''}`.trim();
    lbl.className = (phase === step ? 'active' : phase > step ? 'done' : '');
  }
}

/* ─── Bin strip ─────────────────────────── */

function _renderStrip() {
  const strip = document.getElementById('bin-strip');
  const seen  = new Set();
  let html    = '';

  aisleBins.forEach(b => {
    const num = b.slice(2, 4);
    if (seen.has(num)) return;
    seen.add(num);

    const isCurrent = currentBin.slice(2, 4) === num;
    const isDone    = aisleBins.filter(x => x.slice(2, 4) === num).some(x => completedBins.has(x));
    const cls       = isCurrent ? 'current' : isDone ? 'done' : '';

    html += `<button class="strip-dot ${cls}"
               onclick="navigateToBin('W${currentBin.charAt(1)}${num}A')">
               ${isCurrent ? num : isDone ? '✓' : num}
             </button>`;
  });

  strip.innerHTML = html;

  // Scroll current dot into view using transform (no layout scroll jump)
  requestAnimationFrame(() => {
    const cur = strip.querySelector('.current');
    if (cur) cur.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  });
}

/* ─── HU List renderer ──────────────────────
   Builds the ENTIRE list as a single HTML string,
   then assigns to innerHTML ONCE.
   This triggers exactly one style recalculation and
   one repaint — the fastest possible DOM update path.
─────────────────────────────────────────── */

function renderHUList() {
  let html = '';

  // Already-counted banner
  if (completedBins.has(currentBin)) {
    html += `<div class="counted-banner">
      <span>✅</span>
      <div>
        <strong>Already Counted Today</strong>
        <br><small>Counting again will replace results</small>
      </div>
    </div>`;
  }

  const nonExtras = currentItems.filter(i => !i.isExtra);
  const extras    = currentItems.filter(i =>  i.isExtra);

  // Expected HU cards
  if (!nonExtras.length && !showingExtra) {
    html += `<div class="empty-bin">
      <span class="icon">📭</span>
      <p>SAP shows this bin as empty</p>
      <p style="color:var(--accent);font-weight:700;font-size:11px;margin-top:6px">
        Tap "+ Found Extra" if you find anything
      </p>
    </div>`;
  } else {
    nonExtras.forEach((item, i) => {
      html += _buildCardHTML(item, currentItems.indexOf(item));
    });
  }

  // Extra items section
  if (extras.length) {
    html += `<div class="section-title" style="color:var(--cyan);margin:14px 0 8px">🔍 Extra Items Found</div>`;
    extras.forEach(item => {
      html += _buildCardHTML(item, currentItems.indexOf(item));
    });
  }

  // Extra item input form
  if (showingExtra) {
    html += `<div class="extra-form">
      <h3>🔍 Found Extra Item</h3>
      <input type="text" class="field mono" id="extra-hu"
             placeholder="HU number (0 if no label)"
             data-action="extra-hu-input" autocomplete="off">
      <div id="extra-autofill" style="margin-bottom:6px"></div>
      <div class="field-row">
        <input type="text" class="field" id="extra-product"
               placeholder="Product #" style="flex:1">
        <input type="number" inputmode="numeric" class="field mono"
               id="extra-qty" placeholder="Qty"
               style="width:90px;text-align:center">
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn-sec" style="flex:1" data-action="cancel-extra">Cancel</button>
        <button class="act-btn confirm" style="flex:2" data-action="submit-extra">Add Item</button>
      </div>
    </div>`;
  }

  // Single innerHTML assignment — one repaint
  huListEl.innerHTML = html;

  // Wire up the extra-hu live lookup AFTER render (can't delegate on dynamically added input)
  const extraHuInput = document.getElementById('extra-hu');
  if (extraHuInput) {
    extraHuInput.addEventListener('input', debounce(_extraHuLookup, 200));
    extraHuInput.focus();
  }

  _updateFinalizeBtn();
}

/* Builds the HTML string for a single HU card */
function _buildCardHTML(item, idx) {
  const isOk      = item.status === 'confirmed';
  const isMiss    = item.status === 'missing';
  const isAdj     = item.status === 'adjusted';
  const isPending = item.status === 'pending';

  const cardClass  = isMiss ? 'missing' : isOk ? 'confirmed' : isAdj ? 'adjusted' : item.isExtra ? 'extra' : '';
  const badgeHTML  = isOk      ? `<span class="hu-badge ok">✓ Confirmed</span>`    :
                     isMiss    ? `<span class="hu-badge miss">✗ Missing</span>`     :
                     isAdj     ? `<span class="hu-badge adj">± Adjusted</span>`     :
                     item.isExtra ? `<span class="hu-badge ext">+ Extra</span>`     : '';

  const qtyMatch   = item.scannedQty === item.sapQty;
  const noteLabel  = item.note ? escHtml(item.note.substring(0, 30)) : 'Add Note';

  // Body differs between pending/resolved states
  let body = '';
  if (isPending || isAdj) {
    body = `
      <div class="qty-row">
        <button class="qty-btn" data-action="adj-minus" data-idx="${idx}">−</button>
        <input type="number" inputmode="numeric" class="qty-input mono"
               value="${item.scannedQty || ''}"
               placeholder="${item.sapQty}"
               data-action="qty-input" data-idx="${idx}">
        <button class="qty-btn plus" data-action="adj-plus" data-idx="${idx}">+</button>
      </div>
      <div class="sap-hint">SAP expects <strong>${item.sapQty}</strong></div>
      <div class="hu-actions">
        <button class="act-btn confirm" data-action="confirm-hu" data-idx="${idx}">
          Confirm ${item.sapQty}
        </button>
        <button class="act-btn miss${isMiss ? ' active' : ''}"
                data-action="mark-missing" data-idx="${idx}">
          Missing
        </button>
      </div>`;
  } else {
    body = `
      <div class="resolved-row">
        <span class="resolved-label">Count</span>
        <span class="resolved-val ${qtyMatch ? 'match' : 'mismatch'}">${item.scannedQty}</span>
      </div>
      <button class="undo-btn" data-action="reset-hu" data-idx="${idx}">↺ Undo</button>`;
  }

  return `<div class="hu-card ${cardClass}" role="listitem">
    <div class="hu-top">
      <span class="hu-id">HU ${escHtml(item.hu || '—')}</span>
      ${badgeHTML}
    </div>
    <div class="hu-meta">
      <div>
        <span class="meta-label">Product</span>
        <span class="meta-val">${escHtml(item.product)}</span>
      </div>
      <div>
        <span class="meta-label">SAP Qty</span>
        <span class="meta-val mono">${item.sapQty}</span>
      </div>
    </div>
    ${item.desc ? `<div class="hu-desc">${escHtml(item.desc)}</div>` : ''}
    ${body}
    <div class="card-footer-row">
      <button class="note-btn${item.note ? ' has' : ''}"
              data-action="add-note" data-idx="${idx}">
        📝 ${noteLabel}
      </button>
      <button class="move-btn" data-action="open-move" data-idx="${idx}">
        🔄 Move Bin
      </button>
    </div>
  </div>`;
}

/* ─── Card action handlers ──────────────── */

function confirmHU(idx) {
  haptic();
  if (!currentItems[idx]) return;
  const item = currentItems[idx];
  // Use typed qty if entered, otherwise snap to SAP qty
  item.scannedQty = item.scannedQty || item.sapQty;
  item.status     = item.scannedQty === item.sapQty ? 'confirmed' : 'adjusted';
  _checkPhaseAdvance();
  renderHUList();
}

function markMissing(idx) {
  haptic();
  if (!currentItems[idx]) return;
  const item = currentItems[idx];
  item.status     = item.status === 'missing' ? 'pending' : 'missing';
  item.scannedQty = item.status === 'missing' ? 0 : item.sapQty;
  _checkPhaseAdvance();
  renderHUList();
}

function adjustQty(idx, delta) {
  haptic();
  if (!currentItems[idx]) return;
  const item      = currentItems[idx];
  item.scannedQty = Math.max(0, (item.scannedQty || 0) + delta);
  item.status     = 'adjusted';
  renderHUList();
}

function setQtyFromInput(idx, val) {
  if (!currentItems[idx]) return;
  const item      = currentItems[idx];
  item.scannedQty = parseFloat(val) || 0;
  if (item.scannedQty > 0) {
    item.status = item.scannedQty === item.sapQty ? 'confirmed' : 'adjusted';
  }
  _updateFinalizeBtn(); // Cheaper than full re-render on every keystroke
}

function resetHU(idx) {
  haptic();
  if (!currentItems[idx]) return;
  currentItems[idx].status     = 'pending';
  currentItems[idx].scannedQty = 0;
  phase = 1;
  _renderPhase();
  renderHUList();
}

function confirmAll() {
  haptic();
  currentItems.forEach(item => {
    if (!item.isExtra && item.status === 'pending') {
      item.scannedQty = item.sapQty;
      item.status     = 'confirmed';
    }
  });
  _checkPhaseAdvance();
  renderHUList();
}

function addNote(idx) {
  if (!currentItems[idx]) return;
  const note = prompt('Note for this HU:', currentItems[idx].note || '');
  if (note !== null) {
    currentItems[idx].note = note.trim();
    renderHUList();
  }
}

/* ─── Extra item form ───────────────────── */

function toggleExtraForm(force) {
  showingExtra = force !== undefined ? force : !showingExtra;
  renderHUList();
}

function _extraHuLookup() {
  const hu      = document.getElementById('extra-hu')?.value.trim();
  const feedback = document.getElementById('extra-autofill');
  if (!feedback) return;
  if (!hu || hu.length < 6) { feedback.innerHTML = ''; return; }

  const match = huIndex.get(hu);
  if (match) {
    const prodEl = document.getElementById('extra-product');
    if (prodEl) prodEl.value = match.product;
    feedback.innerHTML = `<span style="font-size:9px;font-weight:700;color:var(--green);
      background:var(--green-bg);padding:3px 8px;border-radius:6px;display:inline-block">
      Auto-filled from SAP
    </span>`;
  } else {
    feedback.innerHTML = '';
  }
}

function addExtra() {
  const hu      = document.getElementById('extra-hu')?.value.trim()    || '0';
  const product = document.getElementById('extra-product')?.value.trim();
  const qty     = parseFloat(document.getElementById('extra-qty')?.value) || 0;

  if (!product || !qty) { toast('Enter product # and qty', 'amber'); return; }

  const match = huIndex.get(hu);
  currentItems.push({
    hu, product,
    desc:       match ? match.desc  : 'FOUND (Extra)',
    batch:      match ? match.batch : '',
    sapBin:     match ? match.sapBin : '',
    sapQty:     match ? match.sapQty : 0,
    scannedQty: qty,
    status:     'confirmed',
    isExtra:    true,
    note:       '',
  });

  showingExtra = false;
  renderHUList();
  toast('Extra item added', 'blue');
}

/* ─── Phase advancement ─────────────────── */

function _checkPhaseAdvance() {
  const allResolved = currentItems
    .filter(i => !i.isExtra)
    .every(i => i.status !== 'pending');

  if (allResolved && phase === 1) {
    phase = 2;
    _renderPhase();
  }
}

/* ─── Finalize button state ─────────────── */

function _updateFinalizeBtn() {
  const pending   = currentItems.filter(i => i.status === 'pending').length;
  const btn       = document.getElementById('btn-finalize');
  const confirmAll = document.getElementById('btn-confirm-all');

  if (pending > 0) {
    btn.className   = 'btn-pri disabled';
    btn.textContent = `${pending} item${pending > 1 ? 's' : ''} unchecked`;
  } else {
    btn.className   = 'btn-pri';
    btn.textContent = currentItems.length === 0 ? 'Skip Empty Bin →' : 'Finalize & Next Bin →';
  }

  // Hide "Confirm All" when all non-extras are resolved or there's only 1 item
  const unresolved = currentItems.filter(i => !i.isExtra && i.status === 'pending').length;
  if (confirmAll) {
    confirmAll.style.display = (unresolved <= 1) ? 'none' : '';
  }
}

/* ─── Move modal ────────────────────────── */

function openMoveModal(idx) {
  activeMoveIdx = idx;
  const item = currentItems[idx];
  document.getElementById('qm-hu').value  = item.hu;
  document.getElementById('qm-qty').value = item.scannedQty || item.sapQty || 0;
  document.getElementById('qm-bin').value = '';
  document.getElementById('qm-info').innerHTML =
    `<strong style="color:var(--accent)">Moving from ${currentBin}</strong><br>
     Product: ${escHtml(item.product)} · SAP Qty: ${item.sapQty}`;
  document.getElementById('modal-move').classList.add('open');
}

function closeMoveModal() {
  document.getElementById('modal-move').classList.remove('open');
  activeMoveIdx = -1;
}

async function submitMove() {
  const hu     = document.getElementById('qm-hu').value.trim();
  const newBin = document.getElementById('qm-bin').value.trim().toUpperCase();
  const qty    = parseFloat(document.getElementById('qm-qty').value);

  if (!hu || !newBin || isNaN(qty)) { toast('Fill all move fields', 'amber'); return; }
  if (activeMoveIdx < 0) return;

  const item   = currentItems[activeMoveIdx];
  const type   = qty === item.sapQty ? 'move' : 'move_adj';
  const sesId  = 'MOVE-' + new Date().toISOString().split('T')[0];

  // Update local item state immediately (optimistic)
  if (item.isExtra) {
    currentItems.splice(activeMoveIdx, 1);
  } else {
    item.scannedQty = 0;
    item.status     = 'missing';
    item.note       = `Moved to ${newBin}`;
  }
  renderHUList();
  _checkPhaseAdvance();
  closeMoveModal();

  await sendPayload({
    action:          'logAudit',
    user:            auditorName || 'Counter',
    bin:             newBin,
    sessionId:       sesId,
    idempotencyKey:  `${sesId}|${newBin}|${auditorName}|move`,
    items: [{
      hu,
      product: item.product, desc: item.desc, batch: item.batch,
      sapBin: item.sapBin, sapQty: item.sapQty,
      countQty: qty, type,
      note: `Moved from ${currentBin}`,
    }],
  }, 'Movement logged');
}

/* ─── Bin finalization ──────────────────── */

async function finalizeBin() {
  if (isSubmitting) return;
  if (currentItems.some(i => i.status === 'pending')) return;

  isSubmitting = true;
  haptic(30);

  /*
    Business logic: map internal status to backend type codes.

    ok         → Scanned_Bin == Expected_Bin AND Scanned_Qty == Expected_Qty
    adj        → Scanned_Bin == Expected_Bin AND Scanned_Qty != Expected_Qty
    miss       → HU not physically present (missing_temp lifecycle on backend)
    move       → HU found here but sapBin differs, qty matches
    move_adj   → HU found here but sapBin differs, qty also differs
    unexpected → HU not in SAP records at all
  */
  const items = currentItems.map(i => {
    let type = 'ok';
    if (i.status === 'missing') {
      type = 'miss';
    } else if (i.isExtra) {
      if (i.sapBin && i.sapBin !== currentBin) {
        type = i.scannedQty === i.sapQty ? 'move' : 'move_adj';
      } else {
        type = 'unexpected';
      }
    } else if (i.scannedQty !== i.sapQty) {
      type = 'adj';
    }
    return {
      hu: i.hu, product: i.product, desc: i.desc, batch: i.batch,
      sapBin: i.sapBin, sapQty: i.sapQty,
      countQty: i.scannedQty, type, note: i.note,
    };
  });

  const today   = new Date().toISOString().split('T')[0];
  const sesId   = `S-${today}`;
  const fp      = `${items.length}|${items[0]?.hu || 'empty'}`;

  const success = await sendPayload({
    action:         'logAudit',
    user:           auditorName || 'Counter',
    bin:            currentBin,
    items,
    sessionId:      sesId,
    idempotencyKey: `${sesId}|${currentBin}|${auditorName}|${fp}`,
  }, 'Bin finalized ✓');

  if (success) {
    completedBins.add(currentBin);
    _saveDone(completedBins);
    _updateDoneCount();
    stepBin(1);
  }

  isSubmitting = false;
}

/* ─── Payload sending + offline queue ───── */

async function sendPayload(payload, successMsg) {
  try {
    const result = await NovusFetch.post(payload);

    if (result.success === false) {
      toast('Server error: ' + (result.error || 'unknown'), 'red');
      return false;
    }

    if (result.skipped) {
      toast('Already synced (duplicate skipped)', 'amber');
    } else if (successMsg) {
      toast(successMsg, 'green');
    }

    isOnline = true; _updateSyncDot();
    return true;

  } catch {
    // Queue for later sync
    offlineQueue.push(payload);
    _saveQueue();
    _updateQueueBadge();
    isOnline = false; _updateSyncDot();
    toast('Saved offline — will sync when connected', 'amber');
    return true; // Return true so bin still gets marked done locally
  }
}

/* Flush queued payloads when back online */
async function _flushQueue() {
  if (!offlineQueue.length) return;
  const batch  = [...offlineQueue];
  offlineQueue = [];

  const failed = [];
  for (const payload of batch) {
    try {
      const result = await NovusFetch.post(payload);
      if (result.success === false) failed.push(payload);
    } catch {
      failed.push(payload);
    }
  }

  offlineQueue = failed;
  _saveQueue();
  _updateQueueBadge();

  if (failed.length === 0 && batch.length > 0) {
    toast(`${batch.length} queued item${batch.length > 1 ? 's' : ''} synced`, 'green');
  }
}

setInterval(_flushQueue, 15000);

/* ─── UI helpers ────────────────────────── */

function _switchScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
}

function _updateSyncDot() {
  ['sync-dot','sync-dot-count'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.className = isOnline ? 'sync-dot' : 'sync-dot offline';
  });
}

function _updateQueueBadge() {
  const badge = document.getElementById('queue-badge');
  if (!badge) return;
  if (offlineQueue.length > 0) {
    badge.textContent = `${offlineQueue.length} queued`;
    badge.hidden = false;
  } else {
    badge.hidden = true;
  }
}

/* Idempotency key builder */
function _makeKey(bin, sesId, fp) {
  return `${sesId}|${bin}|${auditorName}|${fp}`;
}
</script>
