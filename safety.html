<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Safety Reporter — Novus Ops</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦺</text></svg>">
<style>
:root{--bg:#0f1117;--surface:#181a23;--surface-2:#1f2230;--surface-3:#2a2d3a;--border:#313546;--text:#eceef4;--text-2:#9ba1b5;--text-3:#6c7169;--accent:#5b9aff;--accent-dim:rgba(91,154,255,.1);--green:#34d399;--green-bg:rgba(52,211,153,.1);--green-border:rgba(52,211,153,.25);--red:#f87171;--red-bg:rgba(248,113,113,.1);--red-border:rgba(248,113,113,.25);--amber:#fbbf24;--amber-bg:rgba(251,191,36,.1);--amber-border:rgba(251,191,36,.25);--radius:14px;--radius-sm:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh}
button{font-family:inherit;border:none;cursor:pointer}
button:active{transform:scale(.96)}
input,textarea,select{font-family:inherit}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:12px;font-size:12px;font-weight:700;z-index:9998;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}
.toast.green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.toast.red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.toast.amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.toast.blue{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(79,140,255,.2)}
.screen{display:none;flex-direction:column;min-height:100dvh}
.screen.active{display:flex;animation:screen-in .18s ease}
@keyframes screen-in{from{opacity:0}to{opacity:1}}
.header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px}
.header h1{font-size:16px;font-weight:800}
.hdr-btn{background:var(--surface-2);color:var(--text-2);padding:8px 14px;border-radius:var(--radius-sm);font-size:11px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;transition:background .15s,color .15s}
.hdr-btn:hover{background:var(--accent-dim);color:var(--accent)}
.report-btn{background:var(--red);color:#fff;padding:10px 18px;border-radius:12px;font-size:11px;font-weight:800;text-transform:uppercase;transition:filter .15s}
.report-btn:hover{filter:brightness(1.1)}
.content{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{display:none}
.filter-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.filter-pill{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;background:var(--surface-2);cursor:pointer;border:1.5px solid transparent;transition:all .15s;font-size:10px;font-weight:800}
.filter-pill:hover{filter:brightness(1.15)}
.filter-pill.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.filter-pill .fp-count{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px}
.filter-pill .fp-label{font-size:8px;font-weight:700;text-transform:uppercase;color:var(--text-3)}
.filter-pill.active .fp-label{color:var(--accent)}
.stats-row{display:flex;gap:8px;margin-bottom:16px}
.stat-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center;transition:border-color .15s}
.stat-box:hover{border-color:var(--accent)}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}
.stat-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.1px;color:var(--text-3);margin-top:3px}
.inc-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s,transform .1s;animation:card-in .18s ease both}
.inc-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.inc-card:active{transform:scale(.99)}
@keyframes card-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.inc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.inc-badges{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.badge{font-size:8px;font-weight:800;text-transform:uppercase;padding:3px 9px;border-radius:6px}
.badge.sev-low{background:var(--green-bg);color:var(--green)}.badge.sev-medium{background:var(--amber-bg);color:var(--amber)}.badge.sev-high{background:var(--red-bg);color:var(--red)}.badge.sev-critical{background:var(--red-bg);color:#991b1b;font-weight:900}
.badge.status-open{background:var(--red-bg);color:var(--red)}.badge.status-resolved{background:var(--green-bg);color:var(--green)}
.inc-view-btn{font-size:9px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
.inc-loc{font-size:12px;font-weight:700;margin-bottom:3px}
.inc-desc{font-size:11px;color:var(--text-2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.inc-footer{display:flex;justify-content:space-between;margin-top:8px;font-size:9px;color:var(--text-3);font-weight:600}
.inc-resolution-preview{font-size:10px;color:var(--green);background:var(--green-bg);padding:5px 9px;border-radius:6px;margin-top:4px}
.empty{text-align:center;padding:60px 24px;color:var(--text-3)}
.empty-icon{font-size:42px;display:block;margin-bottom:10px}
@keyframes shimmer{to{background-position:-200% 0}}
.skeleton-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px}
.shimmer{background:linear-gradient(90deg,var(--surface-2) 25%,var(--surface-3) 50%,var(--surface-2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:5px}
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:200;align-items:flex-end;justify-content:center;padding:0}
.detail-overlay.open{display:flex;animation:overlay-in .2s ease}
@keyframes overlay-in{from{opacity:0}to{opacity:1}}
.detail-sheet{background:var(--surface);width:100%;max-width:600px;border-radius:20px 20px 0 0;border:1.5px solid var(--border);border-bottom:none;display:flex;flex-direction:column;max-height:92dvh;animation:sheet-up .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes sheet-up{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.detail-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.detail-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.detail-header h2{font-size:15px;font-weight:800}
.detail-close{background:none;color:var(--text-3);font-size:18px;font-weight:900;border:none;cursor:pointer;transition:color .15s}
.detail-close:hover{color:var(--red)}
.detail-body{padding:16px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px}
.detail-body::-webkit-scrollbar{display:none}
.detail-section-title{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-3);margin-bottom:8px}
.detail-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.detail-meta-item{background:var(--surface-2);padding:10px 12px;border-radius:10px;border:1px solid var(--border)}
.detail-meta-label{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-3);margin-bottom:3px}
.detail-meta-val{font-size:13px;font-weight:700;color:var(--text)}
.detail-text-block{background:var(--surface-2);padding:12px 14px;border-radius:10px;border:1px solid var(--border);font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;word-break:break-word}
.detail-text-block.empty{color:var(--text-3);font-style:italic;font-size:12px}
.detail-resolution-block{background:var(--green-bg);border:1px solid rgba(52,211,153,.2);padding:12px 14px;border-radius:10px;font-size:13px;color:var(--green);line-height:1.6;white-space:pre-wrap}
.detail-photo{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;overflow:hidden;text-align:center;padding:8px}
.detail-photo img{max-width:100%;max-height:320px;border-radius:6px;object-fit:contain}
.detail-photo-empty{padding:24px;color:var(--text-3);font-size:11px;font-weight:600}
.detail-id{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-3);background:var(--surface-2);padding:3px 8px;border-radius:4px}
.form-content{flex:1;overflow-y:auto;padding:16px;padding-bottom:40px;-webkit-overflow-scrolling:touch}
.form-content::-webkit-scrollbar{display:none}
.field-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-3);display:block;margin:18px 0 6px}
.field-label:first-child{margin-top:0}
.field-label .required{color:var(--red);margin-left:2px}
.field{width:100%;padding:14px 16px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;font-size:15px;font-weight:600;color:var(--text);outline:none;transition:border-color .15s}
.field:focus{border-color:var(--accent)}
.field::placeholder{color:var(--text-3)}
textarea.field{resize:none;line-height:1.5}
.sev-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.sev-btn{padding:14px 0;border-radius:12px;text-align:center;font-size:10px;font-weight:800;text-transform:uppercase;background:var(--surface-2);color:var(--text-3);border:2px solid transparent;transition:all .15s;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;min-height:60px;justify-content:center}
.sev-btn .sev-icon{font-size:18px}
.sev-btn.active{border-color:var(--sc);color:var(--sc);background:var(--sb)}
.type-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.type-btn{padding:12px;border-radius:10px;text-align:left;font-size:11px;font-weight:700;background:var(--surface-2);color:var(--text-2);border:1.5px solid var(--border);transition:all .15s;cursor:pointer;display:flex;align-items:center;gap:8px}
.type-btn .type-icon{font-size:18px;flex-shrink:0}
.type-btn.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.photo-row{display:flex;gap:8px;margin-bottom:8px}
.photo-btn{flex:1;padding:18px 0;border-radius:12px;text-align:center;font-size:11px;font-weight:800;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;min-height:60px;justify-content:center;transition:all .15s}
.photo-btn.cam{background:var(--accent-dim);border:1.5px dashed rgba(91,154,255,.3);color:var(--accent)}
.photo-btn.gal{background:var(--surface-2);border:1.5px dashed var(--border);color:var(--text-3)}
.photo-btn.gal:hover{border-color:var(--accent);color:var(--accent)}
.preview-wrap{position:relative;margin-bottom:8px}
.preview-img{width:100%;border-radius:12px;border:1px solid var(--border);max-height:200px;object-fit:contain;background:var(--surface-2)}
.preview-remove{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;width:30px;height:30px;border-radius:50%;font-weight:900;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}
.submit-btn{width:100%;margin-top:24px;padding:20px;border-radius:var(--radius);background:var(--red);color:#fff;font-size:14px;font-weight:800;text-transform:uppercase;min-height:60px;transition:filter .15s}
.submit-btn:hover{filter:brightness(1.1)}
.submit-btn:disabled{opacity:.5;pointer-events:none}
.btn-spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.success-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
.success-icon{font-size:64px;margin-bottom:16px;animation:pop-in .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop-in{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.success-screen h2{font-size:24px;font-weight:900;margin-bottom:8px}
.success-screen p{color:var(--text-2);font-size:14px;line-height:1.5}
.success-id{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-3);background:var(--surface);border:1px solid var(--border);padding:8px 14px;border-radius:8px;margin-top:12px}
</style>
</head>
<body>
<div id="toast" class="toast"><span id="toast-text"></span></div>

<div id="screen-list" class="screen active">
  <div class="header">
    <a href="index.html" class="hdr-btn">← Home</a>
    <h1>Safety Reports</h1>
    <div style="display:flex;gap:8px">
      <button class="hdr-btn" style="font-size:14px;padding:8px 10px" onclick="NovusSettings.openModal()">⚙</button>
      <button class="report-btn" onclick="showForm()">+ Report</button>
    </div>
  </div>
  <div class="content" id="list-content"></div>
</div>

<div id="screen-form" class="screen">
  <div class="header">
    <button class="hdr-btn" onclick="showList()">← Back</button>
    <h1>Report Incident</h1>
    <div></div>
  </div>
  <div class="form-content">
    <label class="field-label">Your Name <span class="required">*</span></label>
    <input type="text" class="field" id="f-name" placeholder="Your name or badge ID">
    <label class="field-label">Location <span class="required">*</span></label>
    <input type="text" class="field" id="f-location" placeholder="e.g. Aisle F, near bin WF12A">
    <label class="field-label">Incident Type <span class="required">*</span></label>
    <div class="type-grid" id="type-grid">
      <button class="type-btn active" data-type="Near Miss"       onclick="setType('Near Miss',this)">      <span class="type-icon">⚠️</span> Near Miss</button>
      <button class="type-btn"        data-type="Injury"          onclick="setType('Injury',this)">          <span class="type-icon">🩹</span> Injury</button>
      <button class="type-btn"        data-type="Property Damage" onclick="setType('Property Damage',this)"><span class="type-icon">🏗️</span> Property Damage</button>
      <button class="type-btn"        data-type="Hazard"          onclick="setType('Hazard',this)">          <span class="type-icon">🚨</span> Hazard</button>
      <button class="type-btn"        data-type="Spill"           onclick="setType('Spill',this)">           <span class="type-icon">💧</span> Spill</button>
      <button class="type-btn"        data-type="Other"           onclick="setType('Other',this)">           <span class="type-icon">📋</span> Other</button>
    </div>
    <label class="field-label">Severity <span class="required">*</span></label>
    <div class="sev-grid">
      <button class="sev-btn" data-sev="low" style="--sc:var(--green);--sb:var(--green-bg)" onclick="setSev('low',this)"><span class="sev-icon">🟢</span>Low</button>
      <button class="sev-btn active" data-sev="medium" style="--sc:var(--amber);--sb:var(--amber-bg)" onclick="setSev('medium',this)"><span class="sev-icon">🟡</span>Medium</button>
      <button class="sev-btn" data-sev="high" style="--sc:var(--red);--sb:var(--red-bg)" onclick="setSev('high',this)"><span class="sev-icon">🔴</span>High</button>
      <button class="sev-btn" data-sev="critical" style="--sc:#991b1b;--sb:var(--red-bg)" onclick="setSev('critical',this)"><span class="sev-icon">🚨</span>Critical</button>
    </div>
    <label class="field-label">Photo Evidence</label>
    <div class="photo-row">
      <input type="file" accept="image/*" capture="environment" id="cam-input" hidden onchange="handlePhoto(event)">
      <label for="cam-input" class="photo-btn cam"><span style="font-size:20px">📷</span>Camera</label>
      <input type="file" accept="image/*" id="gal-input" hidden onchange="handlePhoto(event)">
      <label for="gal-input" class="photo-btn gal"><span style="font-size:20px">🖼️</span>Gallery</label>
    </div>
    <div id="photo-preview"></div>
    <label class="field-label">Description <span class="required">*</span></label>
    <textarea class="field" id="f-desc" rows="4" placeholder="Describe the hazard, near-miss, or incident in detail…"></textarea>
    <label class="field-label">Immediate Action Taken <span class="required">*</span></label>
    <textarea class="field" id="f-resolution" rows="3" placeholder="What was done immediately to address this?"></textarea>
    <label class="field-label">Current Status</label>
    <div style="display:flex;gap:8px">
      <button class="sev-btn active" id="status-open" style="--sc:var(--red);--sb:var(--red-bg);flex:1" onclick="setStatus('open',this)"><span class="sev-icon">🔴</span>Open</button>
      <button class="sev-btn" id="status-resolved" style="--sc:var(--green);--sb:var(--green-bg);flex:1" onclick="setStatus('resolved',this)"><span class="sev-icon">✅</span>Resolved</button>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="submitIncident()">Submit Safety Report</button>
  </div>
</div>

<div id="screen-success" class="screen">
  <div class="success-screen">
    <div class="success-icon">✅</div>
    <h2>Report Submitted</h2>
    <p>Your safety report has been logged<br>and is visible in the Control Center.</p>
    <div class="success-id" id="success-id"></div>
  </div>
</div>

<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-sheet" id="detail-sheet">
    <div class="detail-handle"></div>
    <div class="detail-header">
      <h2 style="display:flex;align-items:center;gap:8px">🦺 Incident <span class="detail-id" id="detail-id"></span></h2>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<script src="novus-core.js"></script>
<script>
'use strict';
let incidents=[],severity='medium',incidentType='Near Miss',incidentStatus='open',photoBase64=null,currentFilter='all';

loadIncidents();

async function loadIncidents(){
  _renderSkeleton();NovusLoader.start();
  try{const res=await fetch(API_URL+'?type=safety',{redirect:'follow'});const data=JSON.parse(await res.text());incidents=data.incidents||[];}
  catch{incidents=[];toast('Could not load reports','amber');}
  finally{NovusLoader.done();renderList();}
}
function _renderSkeleton(){
  const content=document.getElementById('list-content');
  content.innerHTML=Array.from({length:4},()=>`<div class="skeleton-card"><div style="display:flex;gap:6px;margin-bottom:10px"><div class="shimmer" style="width:60px;height:18px;border-radius:6px"></div><div class="shimmer" style="width:50px;height:18px;border-radius:6px"></div></div><div class="shimmer" style="width:55%;height:14px;margin-bottom:8px"></div><div class="shimmer" style="width:90%;height:11px;margin-bottom:4px"></div><div class="shimmer" style="width:70%;height:11px;margin-bottom:12px"></div><div style="display:flex;justify-content:space-between"><div class="shimmer" style="width:80px;height:10px;border-radius:4px"></div><div class="shimmer" style="width:60px;height:10px;border-radius:4px"></div></div></div>`).join('');
}
function renderList(){
  const content=document.getElementById('list-content');
  const counts={all:incidents.length,open:incidents.filter(i=>i.status==='open').length,resolved:incidents.filter(i=>i.status==='resolved').length};
  const high=incidents.filter(i=>i.severity==='high'||i.severity==='critical').length;
  const statsHTML=`<div class="stats-row"><div class="stat-box"><div class="stat-val" style="color:var(--red)">${counts.open}</div><div class="stat-label">Open</div></div><div class="stat-box"><div class="stat-val" style="color:var(--amber)">${high}</div><div class="stat-label">High/Critical</div></div><div class="stat-box"><div class="stat-val" style="color:var(--green)">${counts.resolved}</div><div class="stat-label">Resolved</div></div><div class="stat-box"><div class="stat-val" style="color:var(--accent)">${counts.all}</div><div class="stat-label">Total</div></div></div>`;
  const pillsHTML=`<div class="filter-bar">${[{key:'all',label:'All',color:''},{key:'open',label:'Open',color:'red'},{key:'resolved',label:'Resolved',color:'green'}].map(f=>`<div class="filter-pill${currentFilter===f.key?' active':''}" onclick="setFilter('${f.key}')"><span class="fp-count" style="color:${f.color?'var(--'+f.color+')':'var(--text-2)'}">${counts[f.key]}</span><span class="fp-label">${f.label}</span></div>`).join('')}</div>`;
  const filtered=currentFilter==='all'?incidents:incidents.filter(i=>i.status===currentFilter);
  let cardsHTML='';
  if(!filtered.length){cardsHTML=`<div class="empty"><span class="empty-icon">🦺</span><p style="font-weight:700">${incidents.length===0?'No incidents reported yet':'No '+currentFilter+' incidents'}</p><p style="font-size:11px;margin-top:4px;color:var(--text-3)">${incidents.length===0?'Tap "+ Report" to log one':'Change the filter above'}</p></div>`;}
  else{cardsHTML=filtered.map((inc,fi)=>{const realIdx=incidents.indexOf(inc),ts=inc.timestamp?new Date(inc.timestamp):null,dateStr=ts?ts.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}):'—',timeStr=ts?ts.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'',hasPhoto=inc.photoUrl&&inc.photoUrl.length>10,hasRes=inc.resolution?.trim().length>0;return`<div class="inc-card" onclick="openDetail(${realIdx})" style="animation-delay:${fi*0.03}s"><div class="inc-top"><div class="inc-badges"><span class="badge sev-${inc.severity||'low'}">${inc.severity||'low'}</span><span class="badge status-${inc.status||'open'}">${inc.status||'open'}</span>${inc.incidentType?`<span class="badge" style="background:var(--surface-3);color:var(--text-2)">${escHtml(inc.incidentType)}</span>`:''} ${hasPhoto?'<span style="font-size:11px">📷</span>':''}${hasRes?'<span style="font-size:11px;color:var(--green)">✓</span>':''}</div><span class="inc-view-btn">View →</span></div><div class="inc-loc">📍 ${escHtml(inc.location||'No location specified')}</div><div class="inc-desc">${escHtml(inc.description||'')}</div>${hasRes?`<div class="inc-resolution-preview">✓ ${escHtml(inc.resolution.substring(0,60))}${inc.resolution.length>60?'…':''}</div>`:''}<div class="inc-footer"><span>👤 ${escHtml(inc.reportedBy||'Anonymous')}</span><span>${dateStr}${timeStr?' · '+timeStr:''}</span></div></div>`;}).join('');}
  content.innerHTML=statsHTML+pillsHTML+cardsHTML;
}
function setFilter(key){currentFilter=key;renderList();}
function openDetail(idx){
  const inc=incidents[idx];if(!inc)return;
  document.getElementById('detail-id').textContent=inc.id||'—';
  const ts=inc.timestamp?new Date(inc.timestamp):null,tsDisp=ts?`${ts.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric',year:'numeric'})} · ${ts.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`:'—';
  const hp=inc.photoUrl&&inc.photoUrl.length>10,isB64=hp&&inc.photoUrl.startsWith('data:'),isUrl=hp&&(inc.photoUrl.startsWith('http://')||inc.photoUrl.startsWith('https://'));
  let photoHTML='';if(isB64)photoHTML=`<img src="${inc.photoUrl}" alt="Incident photo">`;else if(isUrl)photoHTML=`<img src="${escHtml(inc.photoUrl)}" alt="Incident photo" onerror="this.parentElement.innerHTML='<div class=detail-photo-empty>⚠ Image failed</div>'">`;else if(hp)photoHTML=`<img src="data:image/jpeg;base64,${inc.photoUrl}" alt="Incident photo">`;
  document.getElementById('detail-body').innerHTML=`<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"><span class="badge sev-${inc.severity||'low'}">${escHtml(inc.severity||'unknown')}</span><span class="badge status-${inc.status||'open'}">${escHtml(inc.status||'open')}</span>${inc.incidentType?`<span class="badge" style="background:var(--surface-3);color:var(--text-2)">${escHtml(inc.incidentType)}</span>`:''}<span style="margin-left:auto;font-size:10px;color:var(--text-3);font-family:'JetBrains Mono',monospace">${tsDisp}</span></div><div><div class="detail-section-title">📋 Report Details</div><div class="detail-meta-grid"><div class="detail-meta-item"><div class="detail-meta-label">Reported By</div><div class="detail-meta-val">${escHtml(inc.reportedBy||'Anonymous')}</div></div><div class="detail-meta-item"><div class="detail-meta-label">Location</div><div class="detail-meta-val">${escHtml(inc.location||'Not specified')}</div></div></div></div><div><div class="detail-section-title">📝 Description</div><div class="detail-text-block ${inc.description?'':'empty'}">${inc.description?escHtml(inc.description):'No description provided'}</div></div><div><div class="detail-section-title">🔧 Action Taken / Resolution</div>${inc.resolution?.trim()?`<div class="detail-resolution-block">${escHtml(inc.resolution)}</div>`:`<div class="detail-text-block empty">No resolution recorded yet</div>`}</div><div><div class="detail-section-title">📷 Photo Evidence</div><div class="detail-photo">${hp?photoHTML:'<div class="detail-photo-empty">No photo attached</div>'}</div></div>`;
  document.getElementById('detail-overlay').classList.add('open');
}
function closeDetail(e){if(e&&e.target!==document.getElementById('detail-overlay'))return;document.getElementById('detail-overlay').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('detail-overlay').classList.remove('open');});
function showForm(){
  const savedName=NovusSettings.getUser();if(savedName)document.getElementById('f-name').value=savedName;
  severity='medium';incidentType='Near Miss';incidentStatus='open';photoBase64=null;
  document.querySelectorAll('.sev-btn').forEach(b=>b.classList.remove('active'));document.querySelector('[data-sev="medium"]').classList.add('active');
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));document.querySelector('[data-type="Near Miss"]').classList.add('active');
  document.getElementById('status-open').classList.add('active');document.getElementById('status-resolved').classList.remove('active');
  document.getElementById('f-location').value='';document.getElementById('f-desc').value='';document.getElementById('f-resolution').value='';document.getElementById('photo-preview').innerHTML='';
  switchScreen('form');
}
function showList(){switchScreen('list');loadIncidents();}
function setSev(val,el){severity=val;document.querySelectorAll('.sev-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');}
function setType(val,el){incidentType=val;document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');}
function setStatus(val,el){incidentStatus=val;document.getElementById('status-open').classList.toggle('active',val==='open');document.getElementById('status-resolved').classList.toggle('active',val==='resolved');}
function handlePhoto(e){
  const file=e.target.files?.[0];if(!file)return;
  const reader=new FileReader();reader.onload=ev=>{const img=new Image();img.onload=()=>{const maxW=800,scale=img.width>maxW?maxW/img.width:1,canvas=document.createElement('canvas');canvas.width=img.width*scale;canvas.height=img.height*scale;canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);photoBase64=canvas.toDataURL('image/jpeg',.82);document.getElementById('photo-preview').innerHTML=`<div class="preview-wrap"><img src="${photoBase64}" class="preview-img" alt="Preview"><button class="preview-remove" onclick="removePhoto()">✕</button></div>`;};img.src=ev.target.result;};reader.readAsDataURL(file);e.target.value='';
}
function removePhoto(){photoBase64=null;document.getElementById('photo-preview').innerHTML='';}
async function submitIncident(){
  const name=document.getElementById('f-name').value.trim(),location=document.getElementById('f-location').value.trim(),desc=document.getElementById('f-desc').value.trim(),resolution=document.getElementById('f-resolution').value.trim();
  if(!name){_fieldError('f-name','Please enter your name');return;}if(!location){_fieldError('f-location','Please enter the location');return;}if(!desc){_fieldError('f-desc','Please describe the incident');return;}if(!resolution){_fieldError('f-resolution','Please describe the action taken');return;}
  const btn=document.getElementById('submit-btn');btn.disabled=true;btn.innerHTML='<span class="btn-spinner"></span>Submitting…';
  const reportId='INC-'+Date.now().toString(36).toUpperCase();
  try{
    await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},redirect:'follow',body:JSON.stringify({action:'logSafety',id:reportId,reportedBy:name,location,description:desc,severity,incidentType,resolution,status:incidentStatus,photoUrl:photoBase64||''})});
    NovusSettings.set('userName',name);document.getElementById('success-id').textContent=`Report ID: ${reportId}`;switchScreen('success');setTimeout(()=>showList(),2500);
  }catch(err){toast('Submission failed: '+err.message,'red');btn.disabled=false;btn.innerHTML='Submit Safety Report';}
}
function _fieldError(id,msg){toast(msg,'amber');const el=document.getElementById(id);if(!el)return;el.style.borderColor='var(--red)';el.focus();setTimeout(()=>{el.style.borderColor='';},2000);}
function switchScreen(name){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+name).classList.add('active');}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
</script>
</body>
</html>
